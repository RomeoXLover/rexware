# ===========================================================================
# skyutils.xyz — server block for the nginx ALREADY installed on this VPS.
#
# Reverse proxies to the dockerized app on 127.0.0.1:3000 and terminates TLS
# with Let's Encrypt certificates obtained via certbot.
#
# Install (or simply run: sudo ./setup.sh nginx):
#   sudo cp nginx/minefleet.conf /etc/nginx/sites-available/skyutils.xyz
#   sudo ln -sf /etc/nginx/sites-available/skyutils.xyz /etc/nginx/sites-enabled/skyutils.xyz
#   sudo nginx -t && sudo systemctl reload nginx
#
# Getting certificates (or run: sudo ./setup.sh certbot):
#   sudo certbot --nginx -d skyutils.xyz
#   sudo certbot renew --dry-run        # test auto-renewal
#
# Cloudflare SSL/TLS mode: use "Full (strict)".
# ===========================================================================

# ---- Cloudflare real visitor IP (orange cloud) -----------------------------
# Trust Cloudflare's edge ranges and take the client IP from CF-Connecting-IP.
# Refresh ranges from https://www.cloudflare.com/ips/ periodically.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# WebSocket / connection-upgrade helper.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- HTTP: redirect everything to HTTPS -------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name skyutils.xyz;

    # ACME HTTP-01 challenge (kept for certbot renewal via webroot).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: reverse proxy to the dockerized app -----------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name skyutils.xyz;

    # Certificates managed by certbot (or adjust paths manually).
    ssl_certificate     /etc/letsencrypt/live/skyutils.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skyutils.xyz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:skyutils_ssl:10m;
    ssl_session_timeout 1d;

    # HSTS (optional — uncomment if you want HSTS after certbot auto-enables it).
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Forwarding headers — the app trusts these (TRUST_PROXY=1).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSockets / streamed responses.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 30s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_buffering       off;
    }
}
